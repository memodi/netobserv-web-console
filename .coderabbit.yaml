# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: "Be concise and direct. No fluff."
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  sequence_diagrams: false
  review_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false

  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
    - WIP

  path_filters:
    # Go generated files
    - "!**/zz_generated.deepcopy.go"
    - "!vendor/"
    # Generated/transpiled files
    - "!**/*.js.map"
    - "!**/*.d.ts"
    # Test snapshots (review manually when needed)
    - "!**/__snapshots__/**"
    # Package lock files
    - "!web/package-lock.json"
    - "!web/yarn.lock"

  path_instructions:
    - path: "web/src/**/*.{ts,tsx}"
      instructions: |
        Check React hooks dependencies, component re-render optimization, and TypeScript type safety. 
        Verify PatternFly component usage follows best practices. 
        Ensure clickable elements (buttons, links, inputs) have data-test attributes for E2E testing.
    - path: "web/src/**/*.test.{ts,tsx}"
      instructions: "Ensure proper test isolation, mock cleanup, and coverage of edge cases"
    - path: "pkg/**/*.go"
      instructions: "Review error handling, context cancellation, and API backward compatibility"
    - path: "web/cypress/**/*.ts"
      instructions: "Verify E2E test stability, proper waits, and selector resilience"
    - path: "**/Dockerfile*"
      instructions: "Check for security best practices, multi-stage builds, and minimal image size"

  tools:
    # Backend (Go)
    golangci-lint:
      enabled: false  # run in CI

    # Frontend (JavaScript/TypeScript)
    eslint:
      enabled: true
    biome:
      enabled: true

    # Infrastructure & Config
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    hadolint:
      enabled: true
    actionlint:
      enabled: true
    checkov:
      enabled: true
    markdownlint:
      enabled: true

    # Not relevant to this project
    ruff:
      enabled: false
    swiftlint:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    flake8:
      enabled: false
    rubocop:
      enabled: false
    detekt:
      enabled: false
    pmd:
      enabled: false
    clippy:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: false
    stylelint:
      enabled: false
    htmlhint:
      enabled: false
    prismaLint:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    dotenvLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    psscriptanalyzer:
      enabled: false
    cppcheck:
      enabled: false
    clang:
      enabled: false

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  linked_repositories:
  - repository: "netobserv/netobserv-operator"
    instructions: "Manages deployment and configuration of the console plugin. Consider operator CRD changes when reviewing plugin configuration or backend API."
  - repository: "netobserv/flowlogs-pipeline"
    instructions: "Backend service providing flow data to the console plugin. Review API compatibility when modifying data queries, aggregation logic, or frontend data models."
